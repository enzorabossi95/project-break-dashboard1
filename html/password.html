<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contraseñas</title>
  <link rel="stylesheet" href="../css/styles.css">

</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">◈ ER</a>
    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="clock.html">Reloj</a></li>
      <li><a href="weather.html">Clima</a></li>
      <li><a href="password.html" class="active">Contraseñas</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-container">

      <div class="page-heading">
        <h1>Generador de Contraseñas</h1>
        <p>Contraseñas seguras con mayúsculas, minúsculas, números y símbolos</p>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Contraseña Segura</span>
        </div>

        <div class="password-controls">
          <span class="password-label">Número de caracteres (12–50)</span>
          <input
            type="number"
            id="password-length"
            class="input input-number"
            value="16"
            min="12"
            max="50"
          >
          <button id="btn-generate" class="btn btn-primary">Generar contraseña</button>
        </div>

        <div class="password-result-wrap">
          <span id="password-output" class="password-output password-placeholder">
            — pulsa Generar —
          </span>
          <button id="btn-copy" class="btn btn-ghost">Copiar</button>
        </div>

      </div>
    </div>
  </main>

  <script src="../js/bg.js"></script>
  <script src="../js/password.js"></script>

</body>
</html>
