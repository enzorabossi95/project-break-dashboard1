<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reloj Digital</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">◈ ER</a>
    <ul class="nav-links">
      <li><a href="../index.html">Inicio</a></li>
      <li><a href="clock.html" class="active">Reloj</a></li>
      <li><a href="weather.html">Clima</a></li>
      <li><a href="password.html">Contraseñas</a></li>
      <li><a href="links.html">Links</a></li>
    </ul>
  </nav>

  <main class="main-content">
    <div class="page-container">

      <div class="page-heading">
        <h1>Reloj Digital</h1>
        <p>Hora y fecha local del usuario</p>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Reloj Digital + Fecha</span>
        </div>

        <div class="clock-display">
          <div class="clock-time">
            <span id="clock-hours">--</span>
            <span class="clock-sep">:</span>
            <span id="clock-minutes">--</span>
          </div>
          <div class="clock-seconds">: <span id="clock-seconds">--</span></div>
          <div class="clock-date" id="clock-date">-- / -- / ----</div>
          <p class="clock-phrase" id="clock-phrase"></p>
        </div>
      </div>

    </div>
  </main>

  <script src="../js/bg.js"></script>
  <script src="../js/clock.js"></script>

</body>
</html>
